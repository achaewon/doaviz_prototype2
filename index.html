e. He has garnered more 35 design excellence awards. Yale-NUS College, Assyafaah Mosque and Maxwell Chambers also won the Chicago Anthaneum International Awards. Kok Hiang is a Professor(Practice) in the Architectural Department of the National University of Singapore.","e":["architecture","urban design","architectural design excellence","preservation of sites and monuments"],"ini":"TH","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2019/06/tankokhiang.jpg","gi":[0,2],"si":[0,13]},{"n":"WONG Mun Summ","p":"Professor (Practice Track); Co-Programme Director, MSc ISD (Practice Track)","s":"Practice Track","u":"https://cde.nus.edu.sg/arch/staffs/wong-mun-summ/","d":"Mun Summ Wong co-founded the Singapore-based architectural practice WOHA in 1994. He is a Professor in Practice at the National University of Singapore's Department of Architecture and co-directs the Integrated Sustainable Design Masters Studio. He is also appointed to the Seidler Chair in the Practice of Architecture at the University of New South Wales in Sydney, Australia. He sits on the Nominating Committee of the Lee Kuan Yew World City Prize, the Design Advisory Board of DesignSingapore Council as well as a Member of the CTBUH Masters of Tall Building and Vertical Urbanism Advisory Panel, in collaboration with the Illinois Institute of Technology.","e":["practice of architecture","tall building and vertical urbanism","integrated sustainable design","environmental solutions to high-rise living"],"ini":"WS","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2019/06/woha-portraits-1-recovered.jpg","gi":[0,1],"si":[1,22]},{"n":"TAN Puay Yok (Dr)","p":"Professor (Tenure Track)","s":"Tenure Track","u":"https://cde.nus.edu.sg/arch/staffs/tan-puay-yok-dr/","d":"He is the Co-Editor-in-Chief for Landscape and Urban Planning (Elsevier), Associate Editor for Journal of Urban Ecology (Oxford University Press), Editorial Board Member of npj Urban Sustainability (Nature Partner Journals), and Advisory Board Member of The Gardens Bulletin (Singapore Botanic Gardens). He is active in international collaborations, grant reviews and publishes widely in different forums. He also advises on greening policies, landscape design and planning projects in the region as a means of transferring knowledge from the academia to practice.","e":["tropical botany","horticulture","greenery","ecology"],"ini":"TY","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2019/06/tanpuayyok.jpg","gi":[3],"si":[16,17]},{"n":"HO Puay Peng (Dr)","p":"Professor; Programme Director, MA ArC (Tenure Track); UNESCO Chair on Architectural Heritage Conservation and Management in Asia","s":"Tenure Track","u":"https://cde.nus.edu.sg/arch/staffs/ho-puay-peng-dr/","d":"Professor Ho holds the UNESCO Chair on Architectural Heritage Conservation and Management in Asia. Having close to 30 years of experience in the academia, Puay-Peng's main research interests are in architectural history and conservation practices, and how the knowledge can be translated in teaching and practice. Prior to joining NUS in 2017, Puay-Peng was Professor of Architecture and served as Director of School of Architecture and University Dean of Students at The Chinese University of Hong Kong. Sustaining his research is the quest to understand religious culture and its architectural forms. His main focus is Buddhist architecture and ritual of medieval China.","e":["architectural history","conservation practices","religious culture and its architectural forms","Buddhist architecture"],"ini":"HP","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2019/06/img-4.jpg","gi":[2],"si":[12,13]},{"n":"LAM Khee Poh (Dr)","p":"PROVOST'S CHAIR PROFESSOR OF ARCHITECTURE AND THE BUILT ENVIRONMENT (Tenure Track)","s":"Tenure Track","u":"https://cde.nus.edu.sg/arch/staffs/lam-khee-poh-dr/","d":"Professor Lam is an educator, researcher, architect and consultant who specialises in life cycle building information modelling and computational design support systems for total building performance analysis and building diagnostics. He teaches architectural design (with a focus on systems integration), net zero carbon developments, and \"Well & Green\" built environment. He has completed many major funded research projects in Singapore and the USA, and findings are widely published.","e":["life cycle building information modelling","computational design support systems for total building performance analysis","building diagnostics","architectural design with a focus on systems integration"],"ini":"LP","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2019/06/lamkheepoh.jpg","gi":[0,5],"si":[0,24]},{"n":"HENG Chye Kiang (Dr)","p":"Provost's Chair Professor; Deputy Dean, CDE; Advisor to Head; Director of the Centre for Sustainable Asian Cities (CSAC) (Tenure Track)","s":"Tenure Track","u":"https://cde.nus.edu.sg/arch/staffs/heng-chye-kiang-dr/","d":"Professor Heng Chye Kiang is the Provost's Professor at the College of Design and Engineering, National University of Singapore, where he was the former Dean of School of Design and Environment (SDE) (2007 to 2016) and the Head of its Department of Architecture prior to his deanship. He teaches and researches urban history, sustainable urban design and planning, and publishes widely in these areas. Professor Heng has served on the boards of government agencies including the URA, HDB, CLC, JTC, BCA and advises academic institutions like SIT, NAFA, CUHK and HKU.","e":["urban history","sustainable urban design and planning","urban planning"],"ini":"HK","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2019/06/hengchyekiang.jpg","gi":[1,2],"si":[7,14]},{"n":"Jeffrey HOU (Dr)","p":"Provost's Chair; Professor; Head of Department (Tenure Track)","s":"Tenure Track","u":"https://cde.nus.edu.sg/arch/staffs/jeffrey-hou/","d":"In a career that spans the Pacific, Professor Jeff Hou has worked with indigenous tribes, farmers, fishers, and villagers in Asia and inner-city immigrant youths and elders in North American cities, on projects ranging from the conservation of wildlife habitats to bottom-up urban placemaking. Before his appointment as the Head of the Department at DOA in 2024, Hou was Professor of Landscape Architecture and led the Urban Commons Lab at the University of Washington (UW), Seattle. He served as Chair of Landscape Architecture at UW from 2009 to 2017.","e":["conservation of wildlife habitats","bottom-up urban placemaking","civic engagement","environmental planning"],"ini":"JH","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2024/04/jhou.png","gi":[1,3],"si":[5,10,17]},{"n":"Nikhil JOSHI (Dr)","p":"Senior Lecturer (Educator Track)","s":"Educator Track","u":"https://cde.nus.edu.sg/arch/staffs/nikhil-joshi-dr/","d":"Nikhil Joshi is a Senior Lecturer in the Department of Architecture at the National University of Singapore (NUS). Educated at the University of Pune (India), University of York (UK) and National University of Singapore (Singapore). His research interests include cultural heritage management; traditional building materials and techniques; and community participatory approaches. Before joining NUS, Nikhil worked and taught in India, UK, and Malaysia for over a decade. He is a Fellow of the Royal Geographical Society, UK, and recipient of the Society for the Protection of Ancient Buildings – Lethaby Scholarship, UK.","e":["cultural heritage management","traditional building materials and techniques","community participatory approaches","urban heritage"],"ini":"NJ","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2019/10/Nikhil.jpg","gi":[0,1,2],"si":[2,5,13]},{"n":"Imran Bin TAJUDEEN (Dr)","p":"Senior Lecturer (Educator Track)","s":"Educator Track","u":"https://cde.nus.edu.sg/arch/staffs/imran-bin-tajudeen-dr/","d":"Dr Imran bin Tajudeen researches cultural encounters through architecture across the longue durée and examines the vernacular city and its heritage tropes. His doctoral dissertation on this topic (NUS, 2009) won the ICAS Book Prize in 2011. He is co-editor of Southeast Asia's Modern Architecture (2018) and was postdoctoral fellow at MIT's Aga Khan Program (2009–10) and the IIAS in Leiden (2010–11). He was also Mutawa Visiting Fellow at OXCIS (Oxford, 2019-2020; 2022). Dr Imran teaches topics on identity and representation through the arts, urban history, and built cultural heritage in maritime Southeast Asia, focusing on Singapore and maritime Southeast Asia.","e":["cultural encounters through architecture across the longue durée","vernacular city and its heritage tropes","identity and representation through the arts","urban history"],"ini":"IT","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2019/06/imranbintajudeen.jpg","gi":[2],"si":[14,15]},{"n":"Terrence TAN Chun Liang (Dr)","p":"Senior Lecturer (Educator Track)","s":"Educator Track","u":"https://cde.nus.edu.sg/arch/staffs/terrence-tan-chun-liang-dr/","d":"Dr Tan graduated from the NUS BA (Architecture) and Master of Architecture programmes and received his doctorate from the Department of Building where he was appointed as Research Fellow since 2017. He is the PI /Co-PI of various research projects with government agencies and industry partners focusing on urban greenery. His research interests include ground level greenery, vertical and rooftop greenery, urban climatic mapping and simulation, as well as Landscape Design Optimisation. BOOK URBAN GREENING TECHNIQUES: AN INTRODUCTION THIS BOOK PROVIDES AN INTRODUCTION TO THE VARIOUS TECHNOLOGIES AND TECHNIQUES THAT FACILITATE THE URBAN GREENING PROCESS.","e":["urban greenery","ground level greenery","vertical greenery","rooftop greenery"],"ini":"TL","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2020/07/tcl.jpg","gi":[3,4],"si":[17,19,21]},{"n":"Shin YOKOO","p":"Senior Lecturer (Educator Track)","s":"Educator Track","u":"https://cde.nus.edu.sg/arch/staffs/shin-yokoo/","d":"Shin YOKOO is a Senior Lecturer at the Department of Architecture, CDE, NUS. Founded Ouvi as a registered senior architect of Japan in 2004 after completing a master's degree in architecture at the Tokai University Graduate School of Engineering and working at the Masahiro Ikeda Architectural Studio. Earned a PhD (Engineering) from the Tokyo University of Science Graduate School of Science and Technology in 2016. Notable works include the House in Nakago (2021; collaboration with Snark), 4 Episodes (2014; Atelier Nishikata), and Jukkaie (2009; collaboration with Point). He currently teaches design studios and Architectural Tectonics at NUS since 2020.","e":["Architectural Tectonics","architectural design","environmental design","structural design"],"ini":"SY","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2022/02/shin01.png","gi":[0],"si":[0,1]},{"n":"Maxime Cedric DECAUDIN (Dr)","p":"Senior Lecturer; Acting Deputy Programme Director, BLA (Educator Track)","s":"Educator Track","u":"https://cde.nus.edu.sg/arch/staffs/maxime-cedric-decaudin/","d":"Dr Maxime Decaudin is a Senior Lecturer in landscape architecture. Situated at the intersection of landscape studies and environmental history, his research examines the historical agency of nature in Asian contexts. He completed a PhD in Art History at Sorbonne Université titled 'A Barren Rock': An Environmental History of Hong Kong Landscapes under British Colonization, 1794-1898. Prior to joining NUS, Maxime taught landscape architecture at the University of Hong Kong for ten years. In 2019, he was emerging curator at the Canadian Centre for Architecture (CCA) and in 2017, he was a doctoral fellow at the French Centre for Research on Contemporary China (CEFC).","e":["landscape architecture","landscape studies","environmental history of Hong Kong landscapes under British colonization, 1794-1898","Art History"],"ini":"MD","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2022/10/decaudin01.png","gi":[2,3],"si":[12,16,18]},{"n":"LIN Shengwei Ervine","p":"SENIOR LECTURER; Deputy Head (Admin and Finance) (Educator Track)","s":"Educator Track","u":"https://cde.nus.edu.sg/arch/staffs/lin-shengwei-ervine/","d":"Technological advancements have always influenced how we alter the landscape. Even the invention of the hoe and axe allowed early humans to irrigate fields and clear forests. In an age whereby digital tools are readily available to record, study and understand the world around us, how then do these modern tools affect landscape design and planning processes and direct them towards more ecologically and culturally sensitive outcomes?","e":["landscape design","landscape planning"],"ini":"LE","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2019/10/Ervine.jpg","gi":[3],"si":[16]},{"n":"Federico RUBERTO (Dr)","p":"Senior Lecturer; Programme Director, BA Arch (Educator Track)","s":"Educator Track","u":"https://cde.nus.edu.sg/arch/staffs/federico-ruberto/","d":"Federico Ruberto is a writer and designer working between philosophy and design. He holds a PhD [summa cum laude] in \"Philosophy, Art and Critical Thought\" from the European Graduate School, an inquiry on the concept of \"contingency\" in formal/natural languages. He researches, produces and curates textual and material projects that intersect digital (platforms) and physical space (buildings), spatial structures (planetary urbanism), political economy, technology (of self) and (artificial) ecology.","e":["philosophy and design","PhD-level expertise in \"Philosophy, Art and Critical Thought\"","digital platforms","physical space and buildings"],"ini":"FR","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2021/08/pic01.png","gi":[1,2],"si":[4,15]},{"n":"MARSHALL Victoria Jane (Dr)","p":"Senior Lecturer; Programme Director, MLA (Educator Track)","s":"Educator Track","u":"https://cde.nus.edu.sg/arch/staffs/marshall-victoria-jane/","d":"Dr Victoria Jane Marshall is a Senior Lecturer and Director of the MLA programme at the Department of Architecture, National University of Singapore (NUS). Marshall has a PhD in geography from NUS, Singapore (2021), a Master of Landscape Architecture and a Certificate in Urban Design from the University of Pennsylvania, USA (1997), and a Bachelor of Landscape Architecture from the University of New South Wales, Australia (1992).","e":["geography","landscape architecture","urban design","urban studies"],"ini":"MJ","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2021/08/marshallhead.png","gi":[1,3],"si":[4,16]},{"n":"Xiaoxuan LU (Dr)","p":"Visiting Associate Professor","s":"Visiting","u":"https://cde.nus.edu.sg/arch/staffs/xiaoxuan-lu/","d":"Xiaoxuan Lu is a landscape scholar and designer. Prior to her appointment at the National University of Singapore (NUS), she taught at several prestigious universities in Asia, including the University of Hong Kong (HKU), where she served as Director of the Bachelor of Arts in Landscape Studies program. Specializing in territorial-scale landscape analysis and planning, Lu employs critical cartography, photography, and videography in her design research to develop new theoretical framings for socio-spatial phenomena, alternative toolkits for spatial intervention, and practical advisory references for policymakers.","e":["territorial-scale landscape analysis and planning","human geography","landscape studies"],"ini":"XL","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2025/07/luxx.jpeg","gi":[3],"si":[16]},{"n":"Jayde LIN ROBERTS (Dr)","p":"Visiting Associate Professor","s":"Visiting","u":"https://cde.nus.edu.sg/arch/staffs/jayde-lin-roberts/","d":"Jayde Lin Roberts is Visiting Associate Professor at the Department of Architecture (DOA), College of Design and Engineering, National University of Singapore. Prof. Roberts, an interdisciplinary scholar, combines spatial and historical analysis with ethnographic research to examine heritage-making, urban informality, and the effects of transnational networks. She was a Fulbright US Scholar in Yangon, Myanmar (2016-2018) and has published in the International Journal of Heritage Studies, Critical Asian Studies and others, as well as a monograph titled, Mapping Chinese Rangoon: Place and Nation among the Sino-Burmese.","e":["spatial analysis","historical analysis","ethnographic research","heritage-making"],"ini":"JR","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2025/07/Jayde-Lin-Roberts.jpg","gi":[2],"si":[14]},{"n":"H. Koon WEE","p":"Visiting Associate Professor","s":"Visiting","u":"https://cde.nus.edu.sg/arch/staffs/h-koon-wee/","d":"H. Koon Wee is Visiting Associate Professor at the Department of Architecture and NUS Cities. He directs the NUS Cities undergraduate education programme, where he co-developed the Minor in Cities, Cities Summer Programme and the Core Curriculum \"Liveable Cities\" module. Most recently, he led a multi-programme research studio that brought together students from M.Arch, MUP, MAUD and MLA in the re-envisioning of the G2G Suzhou Industrial Park. Formerly at HKU, he was founding director of the Cities in Asia Programme, and academic director of the HKU Shanghai Study Centre, where he led core courses in the history & theory of cities, globalisation, design and others.","e":["history and theory of cities","globalisation","design","modernisation"],"ini":"HW","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2019/06/choice02a.png","gi":[1,2],"si":[6,12]},{"n":"Casey Nai-Huei WANG","p":"VISITING SENIOR FELLOW","s":"Visiting","u":"https://cde.nus.edu.sg/arch/staffs/wang-nai-huei/","d":"Casey Wang is a practitioner and educator in architecture and urbanism active in Greater China. She is the founder of multidisciplinary design practice, BLEND. She received a Bachelor of Science in Architecture from National Cheng Kung University and a Master of Architecture in Urban Design from the Harvard University Graduate School of Design (GSD). Her academic and professional practice and research is primarily focused on architectural / urban design and urban infrastructure. Her early work and experience was in Shanghai from 2003-2005.","e":["architecture","urbanism","architectural design","urban design"],"ini":"CW","img":"https://cde.nus.edu.sg/arch/wp-content/uploads/sites/32/2025/01/casey_w-scaled.jpg","gi":[0,1],"si":[0,4]}],"groups":[{"n":"Architecture Design","c":44},{"n":"Urban Design & Planning","c":42},{"n":"History, Theory & Heritage","c":23},{"n":"Landscape Studies","c":18},{"n":"Sustainability, Climate & Resilience","c":19},{"n":"Technologies, Computation & Data","c":11}],"subgroups":[{"g":"Architecture Design","name":"Spatial Design","count":32},{"g":"Architecture Design","name":"Sustainable & Environmental Design","count":12},{"g":"Architecture Design","name":"Material & Building Systems","count":5},{"g":"Architecture Design","name":"Interior & Exhibition Design","count":5},{"g":"Urban Design & Planning","name":"Urban Studies & Urbanism","count":20},{"g":"Urban Design & Planning","name":"Housing, Community & Social Equity","count":12},{"g":"Urban Design & Planning","name":"Urban Regeneration & Transformation","count":8},{"g":"Urban Design & Planning","name":"City & Regional Planning","count":7},{"g":"Urban Design & Planning","name":"Policy, Governance & Implementation","count":6},{"g":"Urban Design & Planning","name":"Sustainable Development","count":4},{"g":"Urban Design & Planning","name":"Public Space & Placemaking","count":4},{"g":"Urban Design & Planning","name":"Transport & Mobility","count":1},{"g":"History, Theory & Heritage","name":"Architectural History, Theory & Criticism","count":12},{"g":"History, Theory & Heritage","name":"Heritage Conservation & Management","count":7},{"g":"History, Theory & Heritage","name":"Urban History & Asian Urbanism","count":6},{"g":"History, Theory & Heritage","name":"Cultural Sustainability & Critical Spatial Studies","count":3},{"g":"Landscape Studies","name":"Landscape Architecture & Design","count":14},{"g":"Landscape Studies","name":"Urban Ecology","count":7},{"g":"Landscape Studies","name":"Environmental History","count":3},{"g":"Landscape Studies","name":"Digital Landscape Methods","count":2},{"g":"Sustainability, Climate & Resilience","name":"Urban Resilience & Climate Adaptation","count":7},{"g":"Sustainability, Climate & Resilience","name":"Health, Wellbeing & Environmental Performance","count":6},{"g":"Sustainability, Climate & Resilience","name":"Climate-Responsive Architecture","count":5},{"g":"Sustainability, Climate & Resilience","name":"Sustainable Design & Integrated Systems","count":3},{"g":"Technologies, Computation & Data","name":"Computational Design","count":4},{"g":"Technologies, Computation & Data","name":"Urban Analytics & Data Science","count":3},{"g":"Technologies, Computation & Data","name":"Digital Platforms & Spatial Media","count":2}]};

//  weight = number of shared subgroups → drives stroke thickness/opacity.
//  This avoids the false impression that large subgroups have "tighter"
//  connections (they only have more pairs, not stronger ties).
// ═══════════════════════════
const subgroupGi = subgroups.map(s => groups.findIndex(g => g.n === s.g));

// Defined early so both the DRAW block (for sizing circles) and the FORCE
// block (for per-node strength/collide) can reference it.
const spatialDesignSi = subgroups.findIndex(s => s.name === 'Spatial Design');
const isSpatial = p => spatialDesignSi >= 0 && p.si.includes(spatialDesignSi);
const xyStrength = p => isSpatial(p) ? 0.025 : 0.055;

const edgeMap = new Map();
for (let si = 0; si < subgroups.length; si++) {
  const members = people.filter(p => p.si.includes(si));
  for (let i = 0; i < members.length; i++) {
    for (let j = i + 1; j < members.length; j++) {
      const a = members[i].idx, b = members[j].idx;
      const key = a < b ? `${a}-${b}` : `${b}-${a}`;
      if (!edgeMap.has(key)) {
        edgeMap.set(key, { source: a, target: b, sis: [], gis: [], weight: 0 });
      }
      const e = edgeMap.get(key);
      e.sis.push(si);
      e.weight += 1;
    }
  }
}
const edges = Array.from(edgeMap.values()).map(e => {
  e.gis = e.sis.map(si => subgroupGi[si]);
  // Primary group for color = mode of shared subgroups' parent groups.
  // Most pairs share themes within a single group, so this is usually
  // unambiguous; for genuinely cross-group ties, we colour by majority.
  const counts = {};
  let primaryGi = e.gis[0], maxCount = 0;
  for (const g of e.gis) {
    counts[g] = (counts[g] || 0) + 1;
    if (counts[g] > maxCount) { maxCount = counts[g]; primaryGi = g; }
  }
  e.gi = primaryGi;
  return e;
});

// ═══════════════════════════
//  LAYOUT
// ═══════════════════════════
const mEl = document.querySelector('.main');
const W = mEl.clientWidth, H = mEl.clientHeight;
const cx = W/2, cy = H/2;
const svg = d3.select('#svg').attr('viewBox', `0 0 ${W} ${H}`);

// Set up zoom
const viewport = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.5, 4]).on('zoom', e => {
  viewport.attr('transform', e.transform);
  const k = e.transform.k;
  // ── Zoom-level text hierarchy ──
  // Group labels: fully visible at overview, fade out by the time we enter
  // group-focus zoom (focusGroup now targets maxScale 1.45).
  const groupLabelOpacity = k <= 1.05 ? 1
    : k >= 1.35 ? 0
    : 1 - (k - 1.05) / 0.30;
  if (typeof groupLabelG !== 'undefined') {
    groupLabelG.style('opacity', groupLabelOpacity)
               .style('pointer-events', groupLabelOpacity < 0.15 ? 'none' : null);
  }
  // Sub-labels: visible but soft at overview (so user sees all theme names
  // without them competing with group banners + person names). Ramp to full
  // visibility at any zoom-in state.
  const subLabelOpacity = k <= 1.05 ? 0.55
    : k >= 1.15 ? 0.95
    : 0.55 + (k - 1.05) / 0.10 * 0.40;
  if (typeof subLabelG !== 'undefined') {
    subLabelG.style('opacity', subLabelOpacity);
  }
});
svg.call(zoom).on('dblclick.zoom', null);

// ── Camera helpers ──
const PANEL_W = 340;
// Legend is fixed at top-right (width 230 + ~14 right margin). Even when
// the person-detail panel is closed, the legend overlays the right edge,
// so focusBounds must reserve that strip — otherwise sub-labels positioned
// on the right side of the canvas (e.g. History group's first subgroup,
// or any subgroup whose ring position points east) get hidden behind it.
const LEGEND_W = 250;
function focusBounds(pts, {pad=80, panelOpen=false, maxScale=2.0, duration=850} = {}) {
  if (!pts.length) return;
  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const bw = Math.max(maxX - minX, 60);
  const bh = Math.max(maxY - minY, 60);
  // panel takes priority over legend when both would compete for the
  // right strip (panel is wider and overlaps the legend anyway).
  const rightReserve = panelOpen ? PANEL_W : LEGEND_W;
  const availW = W - rightReserve - pad * 2;
  const availH = H - pad * 2;
  const scale = Math.max(0.5, Math.min(availW / bw, availH / bh, maxScale));
  const centerX = (minX + maxX) / 2;
  const centerY = (minY + maxY) / 2;
  const tx = (W - rightReserve) / 2 - scale * centerX;
  const ty = H / 2 - scale * centerY;
  svg.transition().duration(duration).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function focusOverview(duration = 800) {
  // Slight zoom-out so all groups + perimeter sub-labels + person names
  // fit comfortably without clipping at edges. Centre the *actual content
  // bbox* (not the canvas geometric centre) in the visible area, so that
  // pinned orphans above the hexagon don't bias everything upward.
  const scale = 0.80;
  const xs = people.map(p => p.x || cx), ys = people.map(p => p.y || cy);
  const contentCx = (Math.min(...xs) + Math.max(...xs)) / 2;
  const contentCy = (Math.min(...ys) + Math.max(...ys)) / 2;
  const tx = (W - LEGEND_W) / 2 - scale * contentCx;
  const ty = H / 2 - scale * contentCy;
  svg.transition().duration(duration).ease(d3.easeCubicInOut)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function focusGroup(gi, duration = 850) {
  const members = people.filter(p => p.gi.includes(gi));
  if (!members.length) return;
  // Less aggressive zoom + more pad: when entering a group, you want to
  // see its subgroup structure laid out, not have nodes pressed to the edges.
  focusBounds(members, {pad: 120, panelOpen: false, maxScale: 1.45, duration});
}

function focusSub(si, duration = 850) {
  const members = people.filter(p => p.si.includes(si));
  if (!members.length) return;
  // Same label-position formula as tick() — member centroid + ring-direction
  // push. This keeps the label close to the actual cluster, so focusBounds
  // doesn't have to stretch the bbox across a distant nominal ring slot.
  const cx_mem = members.reduce((acc, p) => acc + p.x, 0) / members.length;
  const cy_mem = members.reduce((acc, p) => acc + p.y, 0) / members.length;
  const gi = subgroupGi[si];
  const gC = groupCenters[gi];
  const sC = subgroupCenters[si];
  const dx = sC.x - gC.x, dy = sC.y - gC.y;
  const dist = Math.hypot(dx, dy);
  const OUT = 22;
  const lx = dist > 0.5 ? cx_mem + (dx / dist) * OUT : cx_mem;
  const ly = dist > 0.5 ? cy_mem + (dy / dist) * OUT : cy_mem;
  const LABEL_HALF = 150;
  const labelExtents = [
    { x: lx - LABEL_HALF, y: ly },
    { x: lx + LABEL_HALF, y: ly },
  ];
  focusBounds([...members, ...labelExtents], {pad: 100, panelOpen: false, maxScale: 2.1, duration});
}

function focusPerson(d, duration = 850) {
  // Include person + connected nodes
  const connected = new Set([d.idx]);
  edges.forEach(e => {
    if (e.source.idx === d.idx) connected.add(e.target.idx);
    if (e.target.idx === d.idx) connected.add(e.source.idx);
  });
  const pts = people.filter(p => connected.has(p.idx));
  focusBounds(pts, {pad: 100, panelOpen: true, maxScale: 1.8, duration});
}

// Initial target positions: 6 group centers in hexagonal arrangement
// Tightened R so groups feel more cohesive (less scattered overall).
const R = Math.min(W, H) * 0.28;
const groupCenters = groups.map((g, i) => {
  const a = (i / groups.length) * Math.PI * 2 - Math.PI/2;
  return {x: cx + R * Math.cos(a), y: cy + R * Math.sin(a)};
});

// Subgroup target positions: clustered within their parent group, at sub-radius
const subgroupCenters = subgroups.map((s, si) => {
  const gi = subgroupGi[si];
  const gCenter = groupCenters[gi];
  // Find this subgroup's index within its group
  const groupSubs = subgroups.map((s2, j) => ({s2, j})).filter(x => subgroupGi[x.j] === gi);
  const subIdxWithinGroup = groupSubs.findIndex(x => x.j === si);
  const subCount = groupSubs.length;
  if (subCount === 1) return {x: gCenter.x, y: gCenter.y};
  // Distribute around the group center.
  // Sub-radius scales with parent group population so dense groups
  // (Architecture Design ~44, Urban Design & Planning ~42) get noticeably
  // more internal breathing room. Numbers are tuned so that with R=0.33,
  // adjacent groups still keep ~36px clearance between their subgroup rings.
  const groupPop = groups[gi].c || 10;
  const subR = Math.min(W, H) * 0.085 * (0.9 + Math.min(0.75, groupPop / 55));
  const a = (subIdxWithinGroup / subCount) * Math.PI * 2;
  return {x: gCenter.x + subR * Math.cos(a), y: gCenter.y + subR * Math.sin(a)};
});

// Push Spatial Design's centre further outward (rightward, since its angle
// is 0° from Architecture Design's group centre). With 32 members crammed
// around one attractor, the default position produces a dense black clique
// near Architecture's right side. Shifting the centre east by ~10% of the
// canvas gives the cluster room to spread laterally into the empty area
// to the right of the hexagon's upper-right vertex.
{
  const sdsi = subgroups.findIndex(s => s.name === 'Spatial Design');
  if (sdsi >= 0) {
    const sC = subgroupCenters[sdsi];
    const gC = groupCenters[subgroupGi[sdsi]];
    const dx = sC.x - gC.x, dy = sC.y - gC.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 0.5) {
      const PUSH = Math.min(W, H) * 0.16;
      subgroupCenters[sdsi] = {
        x: sC.x + (dx / dist) * PUSH,
        y: sC.y + (dy / dist) * PUSH,
      };
    }
  }
}

// Initial position for each person: average of their subgroup centers (or group center)
people.forEach(p => {
  if (p.si.length > 0) {
    const cs = p.si.map(si => subgroupCenters[si]);
    p.x = cs.reduce((s,c) => s+c.x, 0) / cs.length + (Math.random()-.5)*30;
    p.y = cs.reduce((s,c) => s+c.y, 0) / cs.length + (Math.random()-.5)*30;
  } else {
    p.x = cx; p.y = cy;
  }
});

// ═══════════════════════════
//  DRAW
// ═══════════════════════════
// Layer order: edges (back) → person nodes → subgroup labels → group labels (front)
const edgeG = viewport.append('g').attr('class', 'edges');
const nodeG = viewport.append('g').attr('class', 'nodes');
const subLabelG = viewport.append('g').attr('class', 'sub-labels');
const groupLabelG = viewport.append('g').attr('class', 'group-labels');

// Edges
// stroke-width and -opacity scale with weight (= # shared themes) via
// CSS custom properties so the .lit / .dim states still apply cleanly.
const edgeEls = edgeG.selectAll('line').data(edges).join('line')
  .attr('class', 'edge')
  .attr('stroke', d => GCOLORS[d.gi])
  .style('--w', d => 0.144 + d.weight * 0.176)
  .style('--o', d => 0.066 + Math.min(0.198, d.weight * 0.0495));

// Person nodes
const nodeEls = nodeG.selectAll('g').data(people).join('g')
  .attr('class', 'pnode')
  .attr('data-pi', d => d.idx);

nodeEls.append('circle')
  .attr('r', d => {
    const baseR = 3 + Math.min(5, d.si.length * 0.6);
    // Spatial Design members get slightly smaller dots — the area already
    // has 32 nodes in close proximity, big circles compound the density.
    return isSpatial(d) ? Math.max(3, baseR - 1) : baseR;
  })
  .attr('fill', d => GCOLORS[d.primaryGi])
  .attr('stroke', '#fff')
  .attr('stroke-width', 0.75);

// Person name label (always visible, small)
nodeEls.append('text')
  .attr('class', 'pname-arc')
  .attr('dy', d => -(3 + Math.min(5, d.si.length * 0.6)) - 4)
  .attr('text-anchor', 'middle')
  .text(d => {
    // Use full name but remove (Dr) etc
    let n = d.n.replace(/\s*\(.*?\)\s*/g, '').trim();
    return n.length > 24 ? n.slice(0, 22) + '…' : n;
  });

// Group labels (placed at centroid - computed after sim)
const groupLabelEls = groupLabelG.selectAll('g').data(groups).join('g')
  .attr('class', 'group-label-grp')
  .attr('data-gi', (d, i) => i);

groupLabelEls.append('text')
  .attr('class', 'group-label')
  .attr('fill', (d, i) => GCOLORS[i])
  .attr('font-size', d => 17 + Math.min(7, d.c * 0.2))
  .each(function(d) {
    const t = d3.select(this);
    const words = d.n.split(/\s+/);
    const lines = [];
    let line = '';
    words.forEach(w => {
      if ((line + ' ' + w).length > 14) { lines.push(line); line = w; }
      else line = line ? line + ' ' + w : w;
    });
    if (line) lines.push(line);
    lines.forEach((ln, i) => {
      t.append('tspan').attr('x', 0).attr('dy', i === 0 ? -(lines.length-1)*7 : 16).text(ln);
    });
  });

// Subgroup labels (hidden by default, shown on group hover/select)
const subLabelEls = subLabelG.selectAll('text').data(subgroups).join('text')
  .attr('class', 'sub-label')
  .attr('data-sgi', (d, i) => i)
  .text(d => d.name);

// ═══════════════════════════
//  FORCE SIMULATION
// ═══════════════════════════
// Loosen attraction only for Spatial Design members (the densest subgroup,
// 32 people). xy strength drops more aggressively, and we add extra collide
// padding so the 496 internal pairs don't pile their lines into a dense
// black smear in the middle of Architecture Design.
// (spatialDesignSi / isSpatial / xyStrength are defined earlier so the
// DRAW block can also reference them when sizing Spatial Design circles.)

// Pin faculty with no group/subgroup data (e.g. TAN Teck Kiam, TEH Joo Heng
// whose bios are blank in the source). Otherwise they get pushed to the
// canvas edges by everyone else's charge — leaving stranded dots at the
// bottom of the layout that look like accidents. Place them in a horizontal
// row ABOVE the entire hexagon — the only zone guaranteed to be free of
// group-label centroids (which now sit closer to canvas centre with R=0.28).
const orphans = people.filter(p => p.si.length === 0);
const orphanSpacing = 110;
const orphanY = cy - R - 55;
orphans.forEach((p, i) => {
  p.fx = cx - (orphans.length - 1) * orphanSpacing / 2 + i * orphanSpacing;
  p.fy = orphanY;
});

const sim = d3.forceSimulation(people)
  .force('link', d3.forceLink(edges)
    .id(d => d.idx)
    // Dynamic link distance: hubs (people in many subgroups) sit further
    // apart from each other than peripheral nodes. Spatial Design edges
    // get an even larger preferred distance so the 32-node clique opens up.
    .distance(d => {
      const sDeg = d.source.si ? d.source.si.length : 1;
      const tDeg = d.target.si ? d.target.si.length : 1;
      const isSpatialEdge = d.sis && d.sis.includes(spatialDesignSi);
      if (isSpatialEdge) return 105 + Math.min(38, (sDeg + tDeg) * 4.5);
      return 95 + Math.min(35, (sDeg + tDeg) * 4);
    })
    // Spatial Design has 496 internal edges — at the default 0.035 strength
    // the cluster ties itself into a tight black knot. 0.020 keeps cluster
    // identity (members visibly belong together) while staying loose enough
    // for charge / collide to open up the centre instead of compacting it.
    .strength(d => {
      const isSpatialEdge = d.sis && d.sis.includes(spatialDesignSi);
      return isSpatialEdge ? 0.020 : 0.035;
    }))
  .force('charge', d3.forceManyBody().strength(-250))
  // Dynamic collide: high-degree nodes claim slightly more space, matching
  // their larger circle radius (r = 3 + min(5, si.length * 0.6)).
  // Spatial Design members get substantially extra padding — with 32 members
  // and 496 internal edges, modest +5 padding can't compete with link tension.
  .force('collide', d3.forceCollide(d => {
    const base = 25 + Math.min(9, d.si.length * 1.6);
    return isSpatial(d) ? base + 6 : base;
  }).strength(1))
  .force('x', d3.forceX(p => {
    // Attract to average subgroup x
    if (p.si.length === 0) return cx;
    return p.si.reduce((s, si) => s + subgroupCenters[si].x, 0) / p.si.length;
  }).strength(xyStrength))
  .force('y', d3.forceY(p => {
    if (p.si.length === 0) return cy;
    return p.si.reduce((s, si) => s + subgroupCenters[si].y, 0) / p.si.length;
  }).strength(xyStrength))
  .alphaDecay(0.016)
  .on('tick', tick);

function tick() {
  edgeEls
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeEls.attr('transform', d => `translate(${d.x},${d.y})`);
  // Update group label positions to centroids
  groups.forEach((g, gi) => {
    const members = people.filter(p => p.gi.includes(gi));
    if (members.length === 0) return;
    const cx = members.reduce((s, p) => s + p.x, 0) / members.length;
    const cy = members.reduce((s, p) => s + p.y, 0) / members.length;
    d3.select(groupLabelEls.nodes()[gi]).attr('transform', `translate(${cx},${cy})`);
  });
  // Sub-label positions — anchor each label at its members' centroid, then
  // nudge it in the "outward from group center" direction so overlapping
  // subgroups (Urban Design's 8 subs, etc.) don't pile up at the group's
  // geometric centre. This keeps labels close to where members actually
  // ended up after simulation (important for sparse subgroups where
  // members drift far from their nominal ring slot), while still
  // separating densely overlapping ones by direction.
  subgroups.forEach((s, si) => {
    const members = people.filter(p => p.si.includes(si));
    if (members.length === 0) return;
    const cx_mem = members.reduce((acc, p) => acc + p.x, 0) / members.length;
    const cy_mem = members.reduce((acc, p) => acc + p.y, 0) / members.length;
    const gi = subgroupGi[si];
    const gC = groupCenters[gi];
    const sC = subgroupCenters[si];
    const dx = sC.x - gC.x, dy = sC.y - gC.y;
    const dist = Math.hypot(dx, dy);
    const OUT = 22;  // smaller push since we're already at member centroid
    const lx = dist > 0.5 ? cx_mem + (dx / dist) * OUT : cx_mem;
    const ly = dist > 0.5 ? cy_mem + (dy / dist) * OUT : cy_mem;
    d3.select(subLabelEls.nodes()[si]).attr('x', lx).attr('y', ly);
  });
}

// Settle then dampen
setTimeout(() => sim.alpha(0.3).restart(), 100);
setTimeout(() => sim.alphaTarget(0), 4000);

// ═══════════════════════════
//  INTERACTIONS
// ═══════════════════════════
let sel = null;
let activeGroup = null;
let activeSub = null;

// Hover person → show edges + highlight connected
nodeEls
  .on('mouseenter', function(ev, d) {
    if (sel || activeGroup !== null || activeSub !== null) return;
    hlPerson(d);
  })
  .on('mouseleave', function() {
    if (!sel && activeGroup === null && activeSub === null) clr();
  })
  .on('click', function(ev, d) {
    ev.stopPropagation();
    sel = d;
    activeGroup = null; activeSub = null;
    clr();
    hlPerson(d);
    nodeEls.classed('lit', p => p.idx === d.idx);
    openPerson(d.idx);
    focusPerson(d, 850);
  });

// Group label click/hover
groupLabelEls
  .on('mouseenter', function(ev, d) {
    if (sel || activeGroup !== null || activeSub !== null) return;
    const gi = +this.dataset.gi;
    hlGroup(gi);
  })
  .on('mouseleave', function() {
    if (!sel && activeGroup === null && activeSub === null) clr();
  })
  .on('click', function(ev) {
    ev.stopPropagation();
    const gi = +this.dataset.gi;
    if (activeGroup === gi) {
      activeGroup = null; activeSub = null;
      clr();
      focusOverview(700);
    } else {
      sel = null;
      activeGroup = gi;
      activeSub = null;
      closeRP();
      clr();
      hlGroup(gi);
      focusGroup(gi, 800);
    }
  });

// Subgroup label click/hover
subLabelEls
  .on('mouseenter', function(ev, d) {
    if (sel) return;
    const si = +this.dataset.sgi;
    hlSub(si);
  })
  .on('mouseleave', function() {
    if (!sel && activeGroup === null && activeSub === null) clr();
    else if (activeGroup !== null && activeSub === null) hlGroup(activeGroup);
  })
  .on('click', function(ev) {
    ev.stopPropagation();
    const si = +this.dataset.sgi;
    if (activeSub === si) {
      activeSub = null;
      activeGroup = subgroupGi[si];
      hlGroup(activeGroup);
      focusGroup(activeGroup, 700);
    } else {
      activeSub = si;
      activeGroup = subgroupGi[si];
      closeRP();
      clr();
      hlSub(si);
      focusSub(si, 800);
    }
  });

svg.on('click', () => {
  const wasActive = sel || activeGroup !== null || activeSub !== null;
  sel = null;
  activeGroup = null;
  activeSub = null;
  closeRP();
  clr();
  document.querySelectorAll('.legend-sub-item').forEach(el => el.classList.remove('active'));
  if (wasActive) focusOverview(700);
});

function hlPerson(d) {
  // Find connected people (sharing subgroup)
  const connected = new Set([d.idx]);
  edges.forEach(e => {
    if (e.source.idx === d.idx) connected.add(e.target.idx);
    if (e.target.idx === d.idx) connected.add(e.source.idx);
  });
  
  nodeEls.classed('dim', p => !connected.has(p.idx))
         .classed('lit', p => connected.has(p.idx));
  
  edgeEls.classed('lit', e => e.source.idx === d.idx || e.target.idx === d.idx)
         .classed('dim', e => !(e.source.idx === d.idx || e.target.idx === d.idx));
  
  // Highlight the groups this person belongs to
  groupLabelEls.style('opacity', (g, i) => d.gi.includes(i) ? 1 : 0.25);
  
  // Show this person's subgroups in muted state (so the user can see which
  // research areas they span), but NOT lit/orange — that would compete
  // visually with the person's own name, especially for people with 2–3
  // subgroups whose labels would otherwise all flare up at once.
  subLabelEls.each(function(s, i) {
    const isMember = d.si.includes(i);
    d3.select(this).classed('show', isMember).classed('lit', false).classed('dim', !isMember);
  });
  
  document.querySelectorAll('.pname').forEach(el => el.classList.toggle('hl', +el.dataset.pi === d.idx));
}

function hlGroup(gi) {
  const membersSet = new Set(people.filter(p => p.gi.includes(gi)).map(p => p.idx));
  const groupSubs = subgroups.map((s, i) => i).filter(i => subgroupGi[i] === gi);
  
  nodeEls.classed('dim', p => !membersSet.has(p.idx))
         .classed('lit', p => membersSet.has(p.idx));
  
  // An edge counts as "in this group" if any of its shared themes belongs
  // to this group. Same-pair edges with cross-group themes still light up
  // for the relevant group, which is the honest representation.
  edgeEls.classed('lit', e => e.gis.includes(gi) && membersSet.has(e.source.idx) && membersSet.has(e.target.idx))
         .classed('dim', e => !e.gis.includes(gi));
  
  groupLabelEls.style('opacity', (g, i) => i === gi ? 1 : 0.2);
  
  // Show subgroup labels for this group's subgroups, dim others
  subLabelEls.each(function(s, i) {
    const inGroup = groupSubs.includes(i);
    d3.select(this).classed('show', inGroup).classed('lit', false).classed('dim', !inGroup);
  });
}

function hlSub(si) {
  const membersSet = new Set(people.filter(p => p.si.includes(si)).map(p => p.idx));
  const gi = subgroupGi[si];
  
  nodeEls.classed('dim', p => !membersSet.has(p.idx))
         .classed('lit', p => membersSet.has(p.idx));
  
  edgeEls.classed('lit', e => e.sis.includes(si))
         .classed('dim', e => !e.sis.includes(si));
  
  groupLabelEls.style('opacity', (g, i) => i === gi ? 0.5 : 0.15);
  
  // When focusing on ONE subgroup, only that one stays visible.
  // Previously kept same-group siblings at baseline opacity for "context",
  // but in dense groups (e.g. History with 4 closely-packed subgroups)
  // that left 4 overlapping labels at ~38% opacity — no clear focus.
  subLabelEls.each(function(s, i) {
    const isSelected = i === si;
    d3.select(this)
      .classed('show', isSelected)
      .classed('lit', isSelected)
      .classed('dim', !isSelected);
  });
}

function clr() {
  nodeEls.classed('dim', false).classed('lit', false);
  edgeEls.classed('lit', false).classed('dim', false).classed('hidden', false);
  groupLabelEls.style('opacity', 1);
  subLabelEls.classed('show', false).classed('lit', false).classed('dim', false);
  document.querySelectorAll('.pname').forEach(el => el.classList.remove('hl'));
}

// ═══════════════════════════
//  PROFILE PANEL
// ═══════════════════════════
const rp = document.getElementById('rp'), rpB = document.getElementById('rpB');
document.getElementById('rpX').onclick = () => { closeRP(); clr(); sel = null; focusOverview(700); };
function closeRP() { rp.classList.remove('open'); }

function openPerson(pi) {
  const p = people[pi];
  const groupNames = p.gi.map(i => groups[i].n);
  const subNames = p.si.map(i => subgroups[i].name);
  const color = GCOLORS[p.primaryGi];
  
  rpB.innerHTML = `
    <div style="margin-bottom:12px">
      ${p.img ? `<img src="${p.img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" style="width:72px;height:72px;border-radius:50%;object-fit:cover;object-position:center 15%;display:block">` : ''}
      <div class="av" style="background:${color};display:${p.img?'none':'flex'}">${p.ini}</div>
    </div>
    <h2>${p.n}</h2>
    <div class="rpos">${p.p}</div>
    <span class="rbdg">${p.s||'Faculty'}</span>
    ${groupNames.length?`<div class="rsec">Research Themes</div><div>${groupNames.map(g=>`<span class="rtag ac">${g}</span>`).join('')}</div>`:''}
    ${subNames.length?`<div class="rsec">Expertise</div><div>${subNames.map(s=>`<span class="rtag">${s}</span>`).join('')}</div>`:''}
    ${p.d?`<div class="rsec">About</div><div class="rdesc">${p.d}</div>`:''}
    ${p.u?`<a class="rlink" href="${p.u}" target="_blank">View NUS Profile →</a>`:''}
  `;
  rp.classList.add('open');
  document.querySelectorAll('.pname').forEach(el => el.classList.toggle('hl', +el.dataset.pi === pi));
}

// ═══════════════════════════
//  LEGEND — hierarchical (Research Themes > Subgroups)
// ═══════════════════════════
const legendBody = document.getElementById('legendBody');
groups.forEach((g, gi) => {
  const grpWrap = document.createElement('div');
  grpWrap.className = 'legend-group';

  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="ld" style="background:${GCOLORS[gi]}"></span><span>${g.n}</span><span class="ar">▸</span>`;

  const subsEl = document.createElement('div');
  subsEl.className = 'legend-subs';

  // Group click: toggle open + zoom + highlight
  item.onmouseenter = () => { if (!sel && activeGroup === null && activeSub === null) hlGroup(gi); };
  item.onmouseleave = () => { if (!sel && activeGroup === null && activeSub === null) clr(); };
  item.onclick = (ev) => {
    ev.stopPropagation();
    item.classList.toggle('open');
    if (activeGroup === gi && activeSub === null) {
      activeGroup = null; activeSub = null; clr(); focusOverview(700);
    } else {
      sel = null; activeGroup = gi; activeSub = null;
      closeRP(); clr(); hlGroup(gi); focusGroup(gi, 800);
    }
  };
  grpWrap.appendChild(item);

  // Subgroups nested inside
  const groupSubs = subgroups.map((s, sgi) => ({...s, sgi})).filter(s => subgroupGi[s.sgi] === gi);
  groupSubs.forEach(s => {
    const sItem = document.createElement('div');
    sItem.className = 'legend-sub-item';
    sItem.dataset.sgi = s.sgi;
    sItem.textContent = s.name;
    sItem.onmouseenter = () => { if (!sel && activeSub === null) hlSub(s.sgi); };
    sItem.onmouseleave = () => { if (!sel && activeSub === null) {
      if (activeGroup !== null) hlGroup(activeGroup); else clr();
    } };
    sItem.onclick = (ev) => {
      ev.stopPropagation();
      document.querySelectorAll('.legend-sub-item').forEach(el => el.classList.remove('active'));
      if (activeSub === s.sgi) {
        activeSub = null; activeGroup = gi; clr(); hlGroup(gi); focusGroup(gi, 700);
      } else {
        sItem.classList.add('active');
        sel = null; activeSub = s.sgi; activeGroup = gi;
        closeRP(); clr(); hlSub(s.sgi); focusSub(s.sgi, 800);
      }
    };
    subsEl.appendChild(sItem);
  });
  grpWrap.appendChild(subsEl);
  legendBody.appendChild(grpWrap);
});

// ═══════════════════════════
//  SIDEBAR
// ═══════════════════════════
const sB = document.getElementById('sB');

groups.forEach((g, gi) => {
  const grpEl = document.createElement('div');
  grpEl.className = 'grp';
  
  const hd = document.createElement('div');
  hd.className = 'grp-hd';
  hd.innerHTML = `
    <span class="gname">${g.n}</span>
    <span class="gcnt">${g.c}</span>
    <span class="ar">▸</span>
  `;
  hd.onclick = (e) => {
    e.stopPropagation();
    hd.classList.toggle('open');
    if (activeGroup === gi && activeSub === null) {
      activeGroup = null; clr(); focusOverview(700);
    }
    else { sel = null; activeGroup = gi; activeSub = null; closeRP(); clr(); hlGroup(gi); focusGroup(gi, 800); }
  };
  grpEl.appendChild(hd);
  
  const subsEl = document.createElement('div');
  subsEl.className = 'subs';
  
  const groupSubs = subgroups.map((s, sgi) => ({...s, sgi})).filter(s => subgroupGi[s.sgi] === gi);
  
  groupSubs.forEach(s => {
    const subEl = document.createElement('div');
    subEl.className = 'sub-item';
    subEl.dataset.sgi = s.sgi;
    subEl.innerHTML = `<span>${s.name}</span><span class="scnt">${s.count}</span>`;
    
    subEl.onclick = (e) => {
      e.stopPropagation();
      document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
      if (activeSub === s.sgi) {
        activeSub = null;
        clr();
        focusOverview(700);
      } else {
        subEl.classList.add('active');
        activeSub = s.sgi;
        activeGroup = subgroupGi[s.sgi];
        sel = null;
        closeRP();
        clr();
        hlSub(s.sgi);
        focusSub(s.sgi, 800);
      }
    };
    subsEl.appendChild(subEl);
    
    const peopleList = document.createElement('div');
    peopleList.className = 'people-list';
    const subPeople = people.map((p, pi) => ({p, pi})).filter(x => x.p.si.includes(s.sgi));
    subPeople.sort((a, b) => a.p.n.localeCompare(b.p.n)).forEach(({p, pi}) => {
      const nm = document.createElement('span');
      nm.className = 'pname';
      nm.dataset.pi = pi;
      nm.textContent = p.n.replace(/\s*\(.*?\)/g, '');
      nm.onclick = (e) => {
        e.stopPropagation();
        sel = p;
        activeGroup = null; activeSub = null;
        clr();
        hlPerson(p);
        nodeEls.classed('lit', q => q.idx === pi);
        openPerson(pi);
        focusPerson(p, 850);
      };
      peopleList.appendChild(nm);
    });
    subsEl.appendChild(peopleList);
  });
  
  grpEl.appendChild(subsEl);
  sB.appendChild(grpEl);
});

// ═══════════════════════════
//  SEARCH
// ═══════════════════════════
document.getElementById('src').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    document.querySelectorAll('.pname').forEach(el => el.style.display = '');
    document.querySelectorAll('.sub-item').forEach(el => el.style.display = '');
    document.querySelectorAll('.grp').forEach(el => el.style.display = '');
    clr();
    return;
  }
  
  const matched = new Set();
  people.forEach(p => {
    if (p.n.toLowerCase().includes(q) ||
        p.p.toLowerCase().includes(q) ||
        p.e.some(e => e.toLowerCase().includes(q))) matched.add(p.idx);
  });
  
  // Filter sidebar
  document.querySelectorAll('.pname').forEach(el => {
    el.style.display = matched.has(+el.dataset.pi) ? '' : 'none';
  });
  document.querySelectorAll('.grp').forEach(grpEl => {
    const hasMatch = grpEl.querySelector('.pname:not([style*="display: none"])');
    grpEl.style.display = hasMatch ? '' : 'none';
    if (hasMatch) {
      grpEl.querySelector('.grp-hd').classList.add('open');
      grpEl.querySelectorAll('.sub-item').forEach(subEl => {
        const peopleList = subEl.nextElementSibling;
        const hasMatchInSub = peopleList && peopleList.querySelector('.pname:not([style*="display: none"])');
        subEl.style.display = hasMatchInSub ? '' : 'none';
        if (hasMatchInSub) subEl.classList.add('active');
      });
    }
  });
  
  // Highlight in graph
  nodeEls.classed('dim', p => !matched.has(p.idx)).classed('lit', p => matched.has(p.idx));
  edgeEls.classed('dim', true).classed('lit', false);
});

// Pre-tick the simulation synchronously so node positions settle before
// we compute the initial overview bbox. Without this, focusOverview(0)
// runs against seed positions, the bbox is wrong, and the layout looks
// biased upward on first load.
for (let i = 0; i < 280; i++) sim.tick();
sim.stop();  // positions are stable; no need to keep the async loop going

// Apply the slightly zoomed-out overview as the initial view (instant, no
// animation). This ensures all content is comfortably visible on page load,
// not pressed against the canvas edges.
focusOverview(0);
</script>
</body>
</html>
